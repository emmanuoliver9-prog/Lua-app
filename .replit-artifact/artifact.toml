kind = "mobile"
previewPath = "/"
title = "Lua — Couples & Cycle App"
version = "1.0.0"
id = "artifacts/lua"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18769

[services.development]
run = "pnpm --filter @workspace/lua run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lua", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/lua", "run", "serve" ]

[services.env]
PORT = "18769"
BASE_PATH = "/"
