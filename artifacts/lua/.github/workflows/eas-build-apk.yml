name: Build APK (EAS)

on:
  push:
    branches:
      - main
    paths:
      - 'artifacts/lua/**'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: EAS Build - Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/lua

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: artifacts/lua/package.json

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK
        run: eas build --platform android --profile ${{ github.event.inputs.profile || 'preview' }} --non-interactive

      - name: Download APK artifact
        run: |
          echo "Build completed. Download your APK from https://expo.dev/accounts/[your-account]/projects/lua/builds"
